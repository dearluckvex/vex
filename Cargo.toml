[package]
name = "xtune"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
tokio = { version = "1.44.0", features = ["full"] }

[target.'cfg(target_os = "linux")'.dependencies]
tun2 = "4.0.0"

[target.'cfg(target_os = "windows")'.dependencies]
wintun = "0.5"

[target.'cfg(target_os = "macos")'.dependencies]
tun = "0.6"
