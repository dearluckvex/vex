# Vex dnsmasq configuration template for AsusWRT-Merlin
# Placed in /jffs/configs/dnsmasq.d/vex.conf
#
# Strategy: China domains resolve via ISP DNS (direct),
#           foreign domains resolve via Vex's built-in DNS (proxied).
#
# __DNS_PORT__ is replaced by vex.sh with the actual DNS port (default 5300).

# Use Vex's internal DNS resolver as the default upstream
# (Vex handles split-DNS internally based on routing rules)
server=127.0.0.1#__DNS_PORT__

# Bypass Vex DNS for local/router domains
server=/local/
server=/router.asus.com/192.168.1.1
address=/router.asus.com/192.168.1.1

# China domains — resolve via ISP DNS directly for speed
# Uncomment and extend this list for specific domains:
# server=/baidu.com/114.114.114.114
# server=/qq.com/114.114.114.114
# server=/taobao.com/114.114.114.114
# server=/jd.com/114.114.114.114
# server=/weixin.qq.com/114.114.114.114

# Prevent DNS rebinding attacks
stop-dns-rebind
rebind-localhost-ok
