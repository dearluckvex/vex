# Vex dnsmasq configuration template for AsusWRT-Merlin
# Placed in /jffs/configs/dnsmasq.d/vex.conf
# Generated by vex.sh — do not edit manually, changes will be overwritten.
#
# Strategy: China domains resolve via ISP DNS (direct),
#           all other domains resolve via Vex built-in DNS (proxied).
#
# __DNS_PORT__ → replaced with actual DNS port (from config, default 5300)
# __ROUTER_IP__ → replaced with LAN gateway IP

# ── DNS security ──────────────────────────────────────────────────────────────
no-resolv            # Do not use /etc/resolv.conf
bogus-priv           # Prevent reverse lookups of private IPs leaking upstream
domain-needed        # Never forward bare names to upstream
stop-dns-rebind      # Block DNS rebinding attacks
rebind-localhost-ok  # Allow 127.x.x.x rebind responses (needed for some tools)

# ── Cache settings ────────────────────────────────────────────────────────────
cache-size=2048
min-cache-ttl=60
# max-cache-ttl=3600

# ── Default upstream: Vex internal DNS ────────────────────────────────────────
server=127.0.0.1#__DNS_PORT__

# ── Local / router domains bypass ─────────────────────────────────────────────
server=/local/
server=/router.asus.com/__ROUTER_IP__
address=/router.asus.com/__ROUTER_IP__

# ── China domains — resolve via ISP DNS for speed (direct route) ─────────────
