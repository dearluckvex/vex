name: CI

on:
  push:
    branches: ["main", "master", "dev", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "master", "dev"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            clang \
            mold

      # ── macOS system dependencies ──────────────────────────────────────────
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      # ── Windows: locate fxc.exe for GPUI HLSL shader compilation ───────────
      - name: Set GPUI_FXC_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $fxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "fxc.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $fxc) {
            Write-Error "fxc.exe not found in Windows Kits"
            exit 1
          }
          echo "GPUI_FXC_PATH=$($fxc.FullName)" >> $env:GITHUB_ENV
          Write-Host "Found fxc.exe: $($fxc.FullName)"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (CLI)
        run: cargo build --package vex-cli --target ${{ matrix.target }}

      - name: Build (GUI)
        # GUI may not build headlessly on Linux CI; mark as allowed to fail
        continue-on-error: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: cargo build --package vex-gui --target ${{ matrix.target }}

      - name: Build (GUI Release, Windows only)
        if: runner.os == 'Windows'
        run: cargo build --package vex-gui --release --target ${{ matrix.target }}

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      # ── Collect artifacts ──────────────────────────────────────────────────
      - name: Collect CLI binary
        shell: bash
        run: |
          EXT=""
          [[ "${{ runner.os }}" == "Windows" ]] && EXT=".exe"
          mkdir -p dist
          cp target/${{ matrix.target }}/debug/vex-cli${EXT} dist/vex-cli_${{ matrix.target }}${EXT}

      - name: Collect GUI binary (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/vex.exe dist/vex-gui_${{ matrix.target }}.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-cli_${{ matrix.target }}
          path: dist/vex-cli_${{ matrix.target }}*
          retention-days: 7

      - name: Upload GUI artifact (Windows only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vex-gui_${{ matrix.target }}
          path: dist/vex-gui_${{ matrix.target }}.exe
          retention-days: 7

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libvulkan-dev libgl1-mesa-dev \
            libasound2-dev libfontconfig1-dev \
            libfreetype6-dev pkg-config clang
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Merlin Router cross-compile check ────────────────────────────────────────
  merlin:
    name: Merlin CLI (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            target: armv7-unknown-linux-musleabihf
          - arch: aarch64
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: merlin-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: merlin-${{ matrix.arch }}-cargo-

      - name: Install cross
        run: cargo install cross --locked

      - name: Cross-compile CLI for ${{ matrix.arch }}
        run: cross build --release --package vex-cli --target ${{ matrix.target }}

      - name: Package Merlin plugin
        run: |
          ARCH="${{ matrix.arch }}"
          # koolcenter derives module name from the UPLOADED FILENAME (without .tar.gz).
          # The installer then looks for webs/Module_{module_name}.asp inside.
          # To get module = "vex" and match webs/Module_vex.asp, the user must upload
          # a file named "vex.tar.gz". We produce a FLAT tar (no root directory) so the
          # contents land directly at /tmp/vex/ when koolcenter extracts it.
          STAGING="vex_staging_${ARCH}"
          TARBALL="vex.tar.gz"   # user uploads this; koolcenter module name = "vex"
          mkdir -p "$STAGING/bin" "$STAGING/webs" "$STAGING/scripts" "$STAGING/cgi-bin"
          # Binary — arch-specific name so install.sh can auto-detect
          cp "target/${{ matrix.target }}/release/vex-cli" "$STAGING/bin/vex-cli-${ARCH}"
          chmod +x "$STAGING/bin/vex-cli-${ARCH}"
          # Top-level metadata
          cp merlin/install.sh merlin/uninstall.sh merlin/config.yaml.template \
             merlin/version "$STAGING/"
          # .valid — platform string for koolcenter pre-validation
          if [ "$ARCH" = "aarch64" ]; then echo "hnd"; else echo "arm"; fi > "$STAGING/.valid"
          # Scripts
          cp merlin/scripts/vex.sh merlin/scripts/iptables.sh \
             merlin/scripts/dnsmasq.conf "$STAGING/scripts/"
          # Web UI (koolcenter checks for webs/Module_{module}.asp; module = "vex")
          cp merlin/webui/webs/Module_vex.asp "$STAGING/webs/Module_vex.asp"
          # CGI backend
          cp merlin/webui/cgi-bin/vex.cgi "$STAGING/cgi-bin/vex.cgi"
          # Permissions
          chmod +x "$STAGING/install.sh" "$STAGING/uninstall.sh" \
                   "$STAGING/scripts/vex.sh" "$STAGING/scripts/iptables.sh" \
                   "$STAGING/cgi-bin/vex.cgi"
          # Flat tar: no root directory — koolcenter extracts to /tmp/vex/ directly
          tar -czf "$TARBALL" -C "$STAGING" .

      - name: Upload Merlin plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-merlin-${{ matrix.arch }}
          path: vex.tar.gz
          retention-days: 14

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
