name: CI

on:
  push:
    branches: ["main", "master", "dev", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "master", "dev"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            clang \
            mold

      # ── macOS system dependencies ──────────────────────────────────────────
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (CLI)
        run: cargo build --package vex-cli --target ${{ matrix.target }}

      - name: Build (GUI)
        # GUI may not build headlessly on Linux CI; mark as allowed to fail
        continue-on-error: ${{ runner.os == 'Linux' }}
        run: cargo build --package vex-gui --target ${{ matrix.target }}

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libvulkan-dev libgl1-mesa-dev \
            libasound2-dev libfontconfig1-dev \
            libfreetype6-dev pkg-config clang
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Merlin Router cross-compile check ────────────────────────────────────────
  merlin:
    name: Merlin CLI (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            target: armv7-unknown-linux-musleabihf
          - arch: aarch64
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: merlin-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: merlin-${{ matrix.arch }}-cargo-

      - name: Install cross
        run: cargo install cross --locked

      - name: Cross-compile CLI for ${{ matrix.arch }}
        run: cross build --package vex-cli --target ${{ matrix.target }}

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
