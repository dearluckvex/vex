name: CI

on:
  push:
    branches: ["main", "master", "dev", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "master", "dev"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            clang \
            mold

      # ── macOS system dependencies ──────────────────────────────────────────
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      # ── Windows: locate fxc.exe for GPUI HLSL shader compilation ───────────
      - name: Set GPUI_FXC_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $fxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "fxc.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $fxc) {
            Write-Error "fxc.exe not found in Windows Kits"
            exit 1
          }
          echo "GPUI_FXC_PATH=$($fxc.FullName)" >> $env:GITHUB_ENV
          Write-Host "Found fxc.exe: $($fxc.FullName)"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (CLI)
        run: cargo build --package vex-cli --target ${{ matrix.target }}

      - name: Build (GUI)
        # GUI may not build headlessly on Linux CI; mark as allowed to fail
        continue-on-error: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: cargo build --package vex-gui --target ${{ matrix.target }}

      - name: Build (GUI Release, Windows only)
        if: runner.os == 'Windows'
        run: cargo build --package vex-gui --release --target ${{ matrix.target }}

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      # ── Collect artifacts ──────────────────────────────────────────────────
      - name: Collect CLI binary
        shell: bash
        run: |
          EXT=""
          [[ "${{ runner.os }}" == "Windows" ]] && EXT=".exe"
          mkdir -p dist
          cp target/${{ matrix.target }}/debug/vex-cli${EXT} dist/vex-cli_${{ matrix.target }}${EXT}

      - name: Collect GUI binary (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/vex.exe dist/vex-gui_${{ matrix.target }}.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-cli_${{ matrix.target }}
          path: dist/vex-cli_${{ matrix.target }}*
          retention-days: 7

      - name: Upload GUI artifact (Windows only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vex-gui_${{ matrix.target }}
          path: dist/vex-gui_${{ matrix.target }}.exe
          retention-days: 7

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libvulkan-dev libgl1-mesa-dev \
            libasound2-dev libfontconfig1-dev \
            libfreetype6-dev pkg-config clang
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Merlin Router cross-compile check ────────────────────────────────────────
  merlin:
    name: Merlin CLI (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            target: armv7-unknown-linux-musleabihf
          - arch: aarch64
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: merlin-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: merlin-${{ matrix.arch }}-cargo-

      - name: Install cross
        run: cargo install cross --locked

      - name: Cross-compile CLI for ${{ matrix.arch }}
        run: cross build --release --package vex-cli --target ${{ matrix.target }}

      - name: Package Merlin plugin
        run: |
          PKG="vex-merlin-${{ matrix.arch }}"
          mkdir -p "$PKG/bin"
          # Binary
          cp target/${{ matrix.target }}/release/vex-cli "$PKG/bin/vex-cli-${{ matrix.arch }}"
          chmod +x "$PKG/bin/vex-cli-${{ matrix.arch }}"
          # Plugin files
          cp merlin/install.sh merlin/uninstall.sh merlin/config.yaml.template "$PKG/"
          cp -r merlin/scripts merlin/webui "$PKG/"
          chmod +x "$PKG/install.sh" "$PKG/uninstall.sh" \
                   "$PKG/scripts/vex.sh" "$PKG/scripts/iptables.sh" \
                   "$PKG/webui/cgi-bin/vex.cgi"
          tar -czf "${PKG}.tar.gz" "$PKG"

      - name: Upload Merlin plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-merlin-${{ matrix.arch }}
          path: vex-merlin-${{ matrix.arch }}.tar.gz
          retention-days: 14

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
